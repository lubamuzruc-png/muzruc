<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир Музыки</title>
    <style>
        :root {
            --bg: #fdfaf5;
            --accent-pink: #fce4ec;
            --accent-blue: #e3f2fd;
            --accent-green: #f1f8e9;
            --text: #4a4a4a;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--white);
            padding: 50px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        header h1 {
            margin: 0;
            font-weight: 300;
            font-size: 2rem;
            color: #78909c;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: -20px 0 30px 0;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .tab-btn {
            background: var(--white);
            border: 1px solid #eee;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .tab-btn.active {
            background-color: #cfd8dc;
            font-weight: bold;
        }

        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        .content-item {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .content-item.active {
            display: block;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        #lessons .card { border-top: 5px solid #bbdefb; }
        #songs .card { border-top: 5px solid #f8bbd0; }
        #video .card { border-top: 5px solid #c8e6c9; }

        video {
            width: 100%;
            border-radius: 12px;
            background: #000;
            margin-top: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<header>
    <h1>Мир Музыки</h1>
    <p>Кабинет музыкального руководителя</p>
</header>

<nav class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'lessons')">Занятия</button>
    <button class="tab-btn" onclick="event, openTab(event, 'songs')">Песни</button>
    <button class="tab-btn" onclick="openTab(event, 'video')">Видео</button>
</nav>

<main class="main-container">
    
    <div id="lessons" class="content-item active">
        <div class="card">
            <h3>Методические материалы</h3>
            <p>Здесь будут конспекты ваших музыкальных занятий.</p>
        </div>
    </div>

    <div id="songs" class="content-item">
        <div class="card">
            <h3>Песенный репертуар</h3>
            <p>Тексты и ноты для работы с детьми.</p>
        </div>
    </div>

    <div id="video" class="content-item">
        <div class="card">
            <h3>Видео 1</h3>
            <video controls playsinline preload="metadata">
                <source src="v1.mp4" type="video/mp4">
                <source src="https://raw.githubusercontent.com/lubamuzruc-png/muzruc/main/v1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="card">
            <h3>Видео 2</h3>
            <video controls playsinline preload="metadata">
                <source src="v2.mp4" type="video/mp4">
                <source src="https://raw.githubusercontent.com/lubamuzruc-png/muzruc/main/v2.mp4" type="video/mp4">
            </video>
        </div>
    </div>

</main>

<footer>
    &copy; 2026 Проект «Lisovey»
</footer>

<script>
    function openTab(evt, tabId) {
        var i, content, tablinks;
        content = document.getElementsByClassName("content-item");
        for (i = 0; i < content.length; i++) {
            content[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabId).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>

</body>
</html>
