<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир Музыки</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --accent-pink: #fce4ec;
            --accent-blue: #e3f2fd;
            --accent-green: #f1f8e9;
            --text: #4a4a4a;
            --white: #ffffff;
            --shadow: rgba(149, 157, 165, 0.1) 0px 8px 24px;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--white);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        header h1 {
            margin: 0;
            font-weight: 300;
            font-size: 2.5rem;
            color: #78909c;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: -25px 0 40px 0;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .tab-btn {
            background: var(--white);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            color: var(--text);
        }

        .tab-btn.active {
            background-color: #cfd8dc;
            font-weight: 600;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .content-item {
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .content-item.active {
            display: block;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            border-left: 8px solid transparent;
        }

        #lessons .card { border-left-color: #bbdefb; }
        #songs .card { border-left-color: #f8bbd0; }
        #video .card { border-left-color: #c8e6c9; }

        video {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            background: #000;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>

<header>
    <h1>Мир Музыки</h1>
    <p>Творческая площадка музыкального руководителя</p>
</header>

<div class="tabs">
    <button id="btn-lessons" class="tab-btn active" onclick="openTab('lessons')">Занятия</button>
    <button id="btn-songs" class="tab-btn" onclick="openTab('songs')">Песни</button>
    <button id="btn-video" class="tab-btn" onclick="openTab('video')">Видео</button>
</div>

<main class="main-container">
    
    <div id="lessons" class="content-item active">
        <div class="card">
            <h3>Методическая копилка</h3>
            <p>Конспекты занятий, дидактические игры и наработки для детей.</p>
        </div>
    </div>

    <div id="songs" class="content-item">
        <div class="card">
            <h3>Репертуар</h3>
            <p>Тексты и ноты любимых песен.</p>
        </div>
    </div>

    <div id="video" class="content-item">
        <div class="card">
            <h3>Видеовизитка / Занятие</h3>
            <video controls>
                <source src="https://raw.githubusercontent.com/lubamuzruc-png/muzruc/main/v1" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
    </div>

</main>

<footer>
    &copy; 2026 Сайт музыкального руководителя
</footer>

<script>
    function openTab(tabId) {
        const contents = document.querySelectorAll('.content-item');
        const buttons = document.querySelectorAll('.tab-btn');
        
        contents.forEach(content => content.classList.remove('active'));
        buttons.forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        // Добавляем активный класс нажатой кнопке
        if(tabId === 'lessons') document.getElementById('btn-lessons').classList.add('active');
        if(tabId === 'songs') document.getElementById('btn-songs').classList.add('active');
        if(tabId === 'video') document.getElementById('btn-video').classList.add('active');
    }
</script>

</body>
</html>
